backend:
  name: git-gateway
  branch: main

# Yayınlanan medya dosyalarının (görsel vs.) nereye kaydedileceği
media_folder: "resim/blog-yukleme"
public_folder: "/resim/blog-yukleme"

publish_mode: simple

collections:
  - name: "blog"
    label: "Blog Yazıları"
    files:
      - file: "content/blog.json"
        label: "Blog Yazıları Listesi"
        name: "posts"
        fields:
          - label: "Yazılar"
            name: "posts"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Başlık", name: "title", widget: "string" }
              - { label: "URL (slug, örn: kutu-harf-tabela)", name: "slug", widget: "string" }
              - { label: "Yayın Tarihi", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
              - { label: "Kapak Görseli", name: "image", widget: "image", required: false }
              - { label: "Kısa Özet", name: "excerpt", widget: "text" }
              - { label: "İçerik", name: "content", widget: "markdown" }
              - { label: "Yayında mı?", name: "published", widget: "boolean", default: true }
