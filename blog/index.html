<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog | Nizip Reklam & Tabela</title>
<meta name="description" content="Nizip Reklam & Tabela blog - tabela, dijital baskı ve reklam çözümleri hakkında yazılar.">
<link rel="icon" type="image/jpeg" href="../resim/nizipreklam.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#070707;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 8%;background:rgba(0,0,0,.7)}
.logo{color:#fff;font-size:28px;font-weight:800;text-decoration:none}
.logo span{color:#39ff14}
main{padding:120px 8% 80px}
h1{color:#00ff66;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.card{background:#121212;border:1px solid #222;border-radius:12px;overflow:hidden;transition:.3s;text-decoration:none;color:#fff;display:block}
.card:hover{transform:translateY(-6px);border-color:#00ff66}
.card img{width:100%;height:180px;object-fit:cover;background:#1a1a1a}
.card div{padding:18px}
.card h3{margin-bottom:8px}
.card p{color:#aaa;font-size:14px;line-height:1.5}
.tarih{color:#00ff66;font-size:12px;margin-bottom:10px;display:block}
.bos{color:#888;text-align:center;padding:60px 0}
</style>
</head>
<body>
<header>
<a href="../index.html" class="logo">NİZİP <span>REKLAM</span></a>
<a href="../index.html" style="color:#00ff66;text-decoration:none">← Anasayfaya Dön</a>
</header>
<main>
<h1>Blog</h1>
<div class="grid" id="blogGrid"></div>
<div class="bos" id="bosMesaj" style="display:none">Henüz yayınlanmış bir yazı yok.</div>
</main>

<script>
fetch('../content/blog.json')
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById('blogGrid');
    const posts = (data.posts || [])
      .filter(p => p.published !== false)
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    if (posts.length === 0) {
      document.getElementById('bosMesaj').style.display = 'block';
      return;
    }

    posts.forEach(p => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = 'yazi.html?slug=' + encodeURIComponent(p.slug);
      const tarih = p.date ? new Date(p.date).toLocaleDateString('tr-TR', {day:'numeric',month:'long',year:'numeric'}) : '';
      a.innerHTML = `
        ${p.image ? `<img loading="lazy" src="../${p.image}" alt="${p.title}">` : ''}
        <div>
          <span class="tarih">${tarih}</span>
          <h3>${p.title}</h3>
          <p>${p.excerpt || ''}</p>
        </div>`;
      grid.appendChild(a);
    });
  })
  .catch(() => {
    document.getElementById('bosMesaj').textContent = 'Yazılar yüklenirken bir sorun oluştu.';
    document.getElementById('bosMesaj').style.display = 'block';
  });
</script>
</body>
</html>
